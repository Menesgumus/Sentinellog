kurallar:

  - id: SSH_BRUTE_FORCE
    ad: "SSH Kaba Kuvvet Saldırısı"
    log_turu: auth
    desen: 'Failed password for .* from (?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Tekrarlayan hatali sifre denemesi tespit edildi"

  - id: GECERSIZ_KULLANICI
    ad: "Gecersiz Kullanici Girisimi"
    log_turu: auth
    desen: 'Invalid user (?P<kullanici>\S+) from (?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Sistemde olmayan kullaniciyla giris denemesi"

  - id: UFW_ENGEL
    ad: "Firewall Engeli"
    log_turu: ufw
    desen: 'UFW BLOCK.*SRC=(?P<src_ip>[\d\.]+).*DST=(?P<dst_ip>[\d\.]+)'
    seviye: ORTA
    aciklama: "Firewall tarafindan engellenen baglanti"

  - id: HTTP_YETKISIZ
    ad: "Yetkisiz HTTP Erisimi"
    log_turu: access
    desen: '(?P<src_ip>[\d\.]+).*"(?P<metod>GET|POST|PUT|DELETE) (?P<yol>\S+).*" (?P<kod>401|403)'
    seviye: ORTA
    aciklama: "Yetkisiz HTTP erisim denemesi"

  - id: HTTP_HATA
    ad: "Sunucu Hatasi"
    log_turu: access
    desen: '(?P<src_ip>[\d\.]+).*"(?P<metod>GET|POST|PUT|DELETE) (?P<yol>\S+).*" (?P<kod>500|502|503)'
    seviye: DUSUK
    aciklama: "Sunucu tarafli hata tespit edildi"
   
  - id: ROOT_LOGIN
    ad: "Root Girisi Denemesi"
    log_turu: auth
    desen: 'Failed password for root from (?P<src_ip>[\d\.]+)'
    seviye: KRITIK
    aciklama: "Root hesabina yetkisiz giris denemesi"
  
  - id: WIN_FAILED_LOGIN
    ad: "Windows Basarisiz Oturum Acma"
    log_turu: winevent
    desen: 'EventID:4625.*IP:(?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Windows uzerinde basarisiz oturum acma denemesi"

  - id: WIN_ADMIN_PRIVILEGES
    ad: "Yonetici Ayricaligi Atandi"
    log_turu: winevent
    desen: 'EventID:4672.*IP:(?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Kullaniciya yonetici ayricaligi atandi"

  - id: WIN_NEW_USER
    ad: "Yeni Kullanici Olusturuldu"
    log_turu: winevent
    desen: 'EventID:4720.*IP:(?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Sistemde yeni kullanici hesabi olusturuldu"

  - id: WIN_GROUP_MEMBER
    ad: "Guvenlik Grubuna Uye Eklendi"
    log_turu: winevent
    desen: 'EventID:4728.*IP:(?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Guvenlik grubuna yetkisiz uye eklendi"

  - id: WIN_SCHEDULED_TASK
    ad: "Zamanlanmis Gorev Olusturuldu"
    log_turu: winevent
    desen: 'EventID:4698.*IP:(?P<src_ip>[\d\.]+)'
    seviye: YUKSEK
    aciklama: "Suphelibir zamanlanmis gorev olusturuldu"